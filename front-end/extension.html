<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fact GPT</title>
    <link rel="stylesheet" href="extension.css" />
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <!-- Product identity and the single entrypoint into the analysis workflow. -->
      <header class="popup-header">
        <h3 class="brand-title">Fact GPT</h3>
        <p class="brand-subtitle">Bias and reliability scanner</p>
      </header>

      <div class="mode-selector" role="group" aria-label="Analysis mode">
        <button id="mode-article" class="mode-option mode-option-active" type="button" aria-pressed="true">
          Article
        </button>
        <button id="mode-podcast" class="mode-option" type="button" aria-pressed="false">
          Podcast
        </button>
      </div>

      <button id="analyze" class="analyze-btn">Analyze Current Page</button>
      <p id="out" class="status-line" aria-live="polite"></p>

      <!-- The popup reconstructs this progress view from worker state in local storage. -->
      <section id="thinking-area" class="thinking-area" style="display: none;">
        <p id="thinking-text" class="thinking-text">AI is reading the screen...</p>
        <div class="scan-line" aria-hidden="true"></div>
      </section>

      <!-- Bias, fact/opinion routing, and researched citations render in source order below. -->
      <section id="results-area_extension" class="results-container" style="display: none;">
        <div class="summary-box">
          <h3>Summary</h3>
          <p class="score-guide-note">Quick guide: 2/10 is low bias, 8/10 is high bias.</p>
          <div id="parsed-output_bin" class="output-box"></div>
        </div>
      </section>

      <section id="fact-opinion-area_extension" class="fact-opinion-container" style="display: none;">
        <div class="fact-opinion-box">
          <h3>Fact vs Opinion</h3>
          <div id="fact-opinion-output_bin" class="output-box"></div>
        </div>
      </section>

      <section id="sources-area_extension" class="sources-container" style="display: none;">
        <div class="sources-box">
          <h3>Research &amp; Sources</h3>
          <div id="sources-output_bin" class="output-box"></div>
        </div>
      </section>

      <section id="podcast-transcript-area" class="podcast-transcript-container" style="display: none;">
        <div class="podcast-transcript-box">
          <h3>Episode Transcript</h3>
          <p id="podcast-meta" class="podcast-meta"></p>
          <details id="podcast-transcript-details">
            <summary>Show speaker transcript</summary>
            <p id="podcast-seek-status" class="podcast-seek-status" aria-live="polite"></p>
            <ol id="podcast-segments" class="podcast-segments"></ol>
            <button id="podcast-load-more" class="podcast-load-more" type="button" style="display: none;">
              Load more transcript
            </button>
          </details>
        </div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
