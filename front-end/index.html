<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactGPT | Civics in Action</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">FactGPT</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Information</a></li>
            </ul>
        </nav>
        <button class="cta-nav">Contact Us</button>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1>Empower Your Voice.</h1>
            <p>Paste a news article to analyze bias and missing perspectives.</p>
            
            <div class="search-container">
                <input type="text" id="userInput" placeholder="Paste news article URL or text here...">
                <button type="button" onclick="parseText()">Analyze</button>
            </div>
        </div>
    </main>

    <section id="results-area" class="results-container" style="display: none;">
        <div class="summary-box">
            <h3>RAW TEXT</h3>
            <pre id="parsed-output" style="white-space: pre-wrap; text-align: left; font-size: 0.9rem; border: 1px solid #ccc; padding: 10px;"></pre>
        </div>
    </section>

    <script src="front-end//script.js"></script>
</body>
</html>
